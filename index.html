<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Mini game</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>Bienvenue sur Burger Rush !</h1>
      <h2><i>"More than a burger. A way of life" </i>- Un américain croisé au hasard</h2>
      <img src="burg.jpg" alt="logo" id="logo">
    </header>
    <main id="app">
      <audio id="musique" src="subwaymusic.mp3" loop></audio>
      <button id="btn-musique">▶️ Musique de fond 🕺</button>
      <div class="cadre-timer">
        <h2 class="titre-timer">Compte à rebours</h2>
        <p class="titre-timer">La force du Burger est-elle avec toi...!? 🫣​</p>
        <div class="timer">
          <div class="temps">
            <h3 id="minute">02</h3>
            <p>MINUTES</p>
          </div>
          <div class="temps">
            <h3 id="secondes">00</h3>
            <p>SECONDES</p>
          </div>
        </div>
      </div>
      <div class="cadre-resultat">
        <p class="commande"></p>
        <div class="container-img-client"><img src="image/client1.png" alt="1er client" class="img-client"></div>
        <p id="resultat"></p>
        <p id="compteur">Score : 0</p>
      </div>
      <div class="ingredients">
        <img src="image/salade.png" class="ingredient condiment" id="salade" >
        <img src="image/tomates.png" class="ingredient condiment" id="tomates">
        <img src="image/oignons_rouges.png" class="ingredient condiment" id="oignons">
        <img src="image/emmental.png" class="ingredient fromage" id="emmental">
        <img src="image/cheddar.png" class="ingredient fromage" id="cheddar">
        <img src="image/barbecue.png" class="ingredient sauce" id="sauce-barbecue">
        <img src="image/verte.png" class="ingredient sauce" id="sauce-verte">
        <img src="image/moutarde.png" class="ingredient sauce" id="sauce-moutarde">
        <img src="image/ketchup.png" class="ingredient sauce sauceSelected" id="sauce-ketchup">
        <img src="image/champignons.png" class="ingredient condiment" id="champignons">
        <img src="image/jambon.png" class="ingredient supplément" id="jambon">
        <img src="image/bacon.png" class="ingredient supplément" id="bacon">
        <img src="image/oeuf.png" class="ingredient supplément" id="oeuf">
        <img src="image/cornichons.png" class="ingredient condiment" id="cornichons">
        <img src="image/concombres.png" class="ingredient condiment" id="concombres">
        <img src="image/poivrons.png" class="ingredient condiment" id="poivrons">
        <img src="image/steak_cuit.png" class="ingredient viande" id="steak-cuit">
        <img src="image/steak_saignant.png" class="ingredient viande" id="steak-saignant">
      </div>
      <img src="image/pain_haut.png" class="pain-haut">
      
        <div class="contenu-burger">
        </div>

      <img src="image/pain_bas.png" class="pain-bas">
      <button id="btn-envoyer" type="button">Envoyer la commande</button>
      <div id="ecran-fin" class="cache">
        <img src="image/fin.jpg" alt="fin du jeu">
        <h1>Fin du jeu !</h1>
      </div>
    </main>
    <script>
      const minutes = document.getElementById('minute')
      const secondes = document.getElementById('secondes')

      const targetDate = new Date().getTime() + 2 * 60 * 1000;

      function timer() {
        const currentDate = new Date().getTime();
        const distance = targetDate - currentDate;

        const min = Math.floor((distance / 1000 / 60) % 60);
        const sec = Math.floor((distance / 1000) % 60);

        minutes.innerHTML = String(min).padStart(2, '0');
        secondes.innerHTML = String(sec).padStart(2, '0');

        if (distance < 0) {
          clearInterval(interval);
          minutes.innerHTML = '00';
          secondes.innerHTML = '00';
          finDuJeu();
        }
      }

      const interval = setInterval(timer, 1000);

      function finDuJeu() {
        document.querySelectorAll("main > *").forEach(el => el.classList.add("cache"));
        document.getElementById("ecran-fin").classList.remove("cache");
      }

      const musique = document.getElementById("musique");
      const btnMusique = document.getElementById("btn-musique");
      let musiqueEnCours = false;

      btnMusique.addEventListener("click", () => {
        if (musiqueEnCours) {
          musique.pause();
          btnMusique.textContent = "▶️ Musique";
        } else {
          musique.play();
          btnMusique.textContent = "⏸️ Musique";
        }
        musiqueEnCours = !musiqueEnCours;
      });
    </script>
    <script src="/JS/app.js" type="module" type="module"></script>
  </body>
</html>
